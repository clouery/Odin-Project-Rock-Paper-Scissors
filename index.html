<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script type="module" src="script.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header">A Game of Rock Paper Scissors</div>

        <div class="middle">
            <div class="score">
                <div class="scoreText">Total Score</div>
                <div class="display">
                    <div class="hscore">Human Score: 0</div>
                    <div class="cscore">Computer Score: 0</div>
                </div>
            </div>

            <div class="screen">
                <div class="question">What will you choose?</div>
                <div class="choices">
                    <button type="button" class="rock">
                        <img src="images/rock.png" alt="Rock">
                    </button>
                    <button type="button" class="paper">
                        <img src="images/paper.png" alt="Paper">
                    </button>
                    <button type="button" class="scissors"> 
                        <img src="images/scissors.png" alt="Scissors">
                    </button>
                </div>
                <div class="win"></div>
            </div>

            <!-- <div class="prevscreen"> -->


        </div>

        <div class="footer">made by Xiang Zhi</div>
    </div>
    </div>
</body>

</html>
